[pytest]
# Pre-load a plugin that imports numpy + pandas before pytest-cov starts.
# Without this, ``--cov=app.services.pzu_service`` triggers a numpy reload
# (via ``find_spec`` → ``app/services/__init__.py`` eager imports → pandas
# pulling numpy after coverage's import-tracing hook is already armed),
# which corrupts numpy's ``_NoValue`` sentinel and crashes ``Series.min()``.
# See ``tests/_preimport_plugin.py`` for full diagnosis.
addopts = -p tests._preimport_plugin
testpaths = tests
