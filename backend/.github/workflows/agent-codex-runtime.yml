name: Agent Codex Runtime

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-codex-runtime
  cancel-in-progress: true

jobs:
  codex-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Pick one runtime issue
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=$(gh issue list --label agent-codex-runtime --label mastermind-created --state open --limit 1 --json number,title,body --jq '.[0]')
          if [ -z "$ISSUE" ] || [ "$ISSUE" = "null" ]; then
            echo "has_issue=false" >> $GITHUB_OUTPUT
          else
            echo "has_issue=true" >> $GITHUB_OUTPUT
            echo "$ISSUE" > issue.json
            echo "number=$(cat issue.json | jq -r '.number')" >> $GITHUB_OUTPUT
            echo "title=$(cat issue.json | jq -r '.title')" >> $GITHUB_OUTPUT
            echo "body<<EOF" >> $GITHUB_OUTPUT
            cat issue.json | jq -r '.body' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Run Codex Runtime Agent
        if: steps.issue.outputs.has_issue == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt: |
            You are Codex Runtime Agent.

            Follow .github/prompts/worker-rules.md.

            Work on this GitHub issue:
            #${{ steps.issue.outputs.number }}
            ${{ steps.issue.outputs.title }}

            Issue body:
            ${{ steps.issue.outputs.body }}

            Focus only on:
            - build errors
            - runtime errors
            - dependency errors
            - import errors
            - TypeScript errors
            - package manager problems

            Do not deploy.
            Do not push to main.
            Implement one focused fix.

      - name: Detect changes
        id: changes
        if: steps.issue.outputs.has_issue == 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.issue.outputs.has_issue == 'true' && steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: agents/codex-runtime-${{ steps.issue.outputs.number }}
          commit-message: "codex-runtime: fix issue #${{ steps.issue.outputs.number }}"
          title: "Codex Runtime Agent: ${{ steps.issue.outputs.title }}"
          body: |
            Codex Runtime Agent worked on issue #${{ steps.issue.outputs.number }}.

            Review before merging.
          delete-branch: true

      - name: No issue found
        if: steps.issue.outputs.has_issue == 'false'
        run: echo "No agent-codex-runtime issue found."
