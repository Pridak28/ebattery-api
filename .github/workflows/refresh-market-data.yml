name: Refresh public market data

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh, validate, and catalogue public market data
        run: python -m app.market_data.pipeline --sources pzu,seed-damas,transelectrica-public,entsoe

      - name: Commit & push if changed
        working-directory: .
        run: |
          if [[ -n "$(git status --porcelain backend/data_catalog DATA_PIPELINE_MANIFEST.md)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add backend/data_catalog DATA_PIPELINE_MANIFEST.md
            git commit -m "data: refresh public market data [skip ci]"
            git push
          else
            echo "No market-data changes."
          fi
