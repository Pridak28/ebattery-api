name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect package manager and install
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Build
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run build
          elif [ -f yarn.lock ]; then
            yarn build
          else
            npm run build
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Deployment placeholder
        run: echo "Production deploy waits for your manual approval in GitHub."
