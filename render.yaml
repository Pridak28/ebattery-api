services:
  - type: web
    name: ebattery-api
    env: python
    # rootDir runs all build/start commands from /opt/render/project/src/backend
    # (the GitHub repo now contains backend/ + frontend/ at root, so without
    # rootDir, `pip install -r requirements.txt` fails with file-not-found).
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "false"
      # data_catalog/processed/ is tracked in git and contains damas_clean.csv
      # + pzu_history_3y.csv (the files FRService and PZUService scan for).
      # Note: rootDir is /opt/render/project/src/backend, so DATA_DIR is set
      # relative to that.
      - key: DATA_DIR
        value: /opt/render/project/src/backend/data_catalog/processed
      # Optional: HTTPS URL to a .zip / .tar.gz of additional data files.
      # On startup, app/main.py downloads & extracts into DATA_DIR if empty.
      - key: BACKEND_DATA_URL
        value: ""
      # Comma-separated extra CORS origins. Defaults already include
      # http://localhost:3000, http://localhost:8000 and the production Netlify.
      - key: CORS_ORIGINS_RAW
        value: "https://ebattery-analytics.netlify.app"
